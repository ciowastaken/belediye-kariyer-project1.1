<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesap Ayarları - Başiskele Belediyesi Kariyer Platformu</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome CSS (İkonlar için) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 20px; /* Navbar varsa boşluk bırakın */
            font-family: 'Poppins', sans-serif;
        }
        .container {
            max-width: 800px;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #005792;
            margin-bottom: 15px;
        }
        .form-label {
            font-weight: 500;
        }
        .btn-primary {
            background-color: #005792;
            border-color: #005792;
        }
        .btn-primary:hover {
            background-color: #003d66;
            border-color: #003d66;
        }
        .btn-danger {
            background-color: #dc3545;
            border-color: #dc3545;
        }
        .btn-danger:hover {
            background-color: #c82333;
            border-color: #bd2130;
        }
        /* Mesaj kutusu */
        #userSettingsMessage {
            display: none;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <h2 class="mb-4 text-center">Hesap Ayarları</h2>
        <div id="userSettingsMessage" class="alert" role="alert"></div>

        <div class="card p-4">
            <h4 class="card-title text-center mb-4">Profil Bilgileri</h4>
            <form id="userProfileForm">
                <div class="text-center mb-4">
                    <img id="profilePicPreview" src="https://via.placeholder.com/120?text=Profil" alt="Profil Fotoğrafı" class="profile-pic">
                    <input type="file" id="profilePicUpload" class="form-control mt-2">
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="profileName" class="form-label">Adınız</label>
                        <input type="text" class="form-control" id="profileName" required>
                    </div>
                    <div class="col-md-6">
                        <label for="profileSurname" class="form-label">Soyadınız</label>
                        <input type="text" class="form-control" id="profileSurname" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="profileEmail" class="form-label">E-posta Adresi (Değiştirilemez)</label>
                    <input type="email" class="form-control" id="profileEmail" readonly>
                </div>
                <div class="mb-3">
                    <label for="profilePhone" class="form-label">Telefon Numarası</label>
                    <input type="tel" class="form-control" id="profilePhone">
                </div>
                <div class="mb-3">
                    <label for="profileAddress" class="form-label">Adres (İlçe/Şehir)</label>
                    <input type="text" class="form-control" id="profileAddress">
                </div>
                <button type="submit" class="btn btn-primary w-100">Bilgileri Kaydet</button>
            </form>
        </div>

        <div class="card p-4">
            <h4 class="card-title text-center mb-4">Şifre Değiştir</h4>
            <form id="changePasswordForm">
                <div class="mb-3">
                    <label for="currentPassword" class="form-label">Mevcut Şifre</label>
                    <input type="password" class="form-control" id="currentPassword" required>
                </div>
                <div class="mb-3">
                    <label for="newPassword" class="form-label">Yeni Şifre</label>
                    <input type="password" class="form-control" id="newPassword" required>
                </div>
                <div class="mb-3">
                    <label for="newPasswordConfirm" class="form-label">Yeni Şifre Tekrar</label>
                    <input type="password" class="form-control" id="newPasswordConfirm" required>
                </div>
                <button type="submit" class="btn btn-warning w-100">Şifreyi Değiştir</button>
            </form>
        </div>

        <div class="card p-4 text-center">
            <h4 class="card-title mb-4">Hesabı Sil</h4>
            <p class="text-muted">Hesabınızı silmek, tüm verilerinizin kalıcı olarak silinmesine neden olacaktır.</p>
            <button class="btn btn-danger w-50 mx-auto" id="deleteAccountBtn">Hesabı Sil</button>
        </div>

        <div class="text-center mt-4">
            <button class="btn btn-secondary" id="logoutBtn">Çıkış Yap</button>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- user_dashboard_app.js dosyasını bir ES modülü olarak bağlayın -->
    <script type="module" src="user_dashboard_app.js"></script>
    <script src="js/basiskele-ui.js"></script>
</body>
</html>
