  <!-- Detay Modal, Footer vb. aynı kalacak… -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script>
    // 1) Firebase başlat ve kalıcı oturum ayarla
    const firebaseConfig = {
      apiKey: "AIzaSyALJWbNPziCXnjbgAwbGxpeRafO0O29fy4",
      authDomain: "belediye-kariyer-project.firebaseapp.com",
      projectId: "belediye-kariyer-project",
      storageBucket: "belediye-kariyer-project.firebasestorage.app",
      messagingSenderId: "1018107908919",
      appId: "1:1018107908919:web:b750dff35acbed659d80b2",
      measurementId: "G-NZN8NGWDT7"
    };
    firebase.initializeApp(firebaseConfig);
    firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    const auth = firebase.auth();
    const db   = firebase.firestore();

    // 2) Bildirim kutusunu temizle
    function clearNotificationsUI() {
      const list  = document.getElementById('notificationList');
      const badge = document.getElementById('notificationCountBadge');
      if (list)  list.innerHTML = '';
      if (badge) badge.style.display = 'none';
    }

    // 3) Kullanıcıya hoşgeldiniz mesajı & bildirimleri yükle
    auth.onAuthStateChanged(user => {
      clearNotificationsUI();
      if (user) {
        alert(`Hoşgeldiniz, ${user.displayName || user.email}!`);
        fetchNotifications(user.uid);
      }
      fetchListings();
    });

    // 4) Utility: kısa mesaj göster
    function showMessage(msg, type='info', targetId='formMessage') {
      const el = document.getElementById(targetId);
      if (!el) return;
      el.textContent = msg;
      el.className = `mt-3 text-center alert alert-${type}`;
      el.style.display = 'block';
      setTimeout(()=> el.style.display='none', 5000);
    }

    // 5) Sayfa yüklendiğinde event listener’ları ata
    document.addEventListener('DOMContentLoaded', () => {
      clearNotificationsUI();

      // Yeni ilan formu, toggle, filtreler vs.
      document.getElementById('new-listing-form')
              .addEventListener('submit', handleAddNewListing);
      document.getElementById('toggle-form-button').addEventListener('click', toggleNewListingForm);
      ['filter-type','filter-work-type','filter-location'].forEach(id =>
        document.getElementById(id).addEventListener('change', fetchListings));
      let searchTimeout;
      document.getElementById('search-input').addEventListener('keyup', ()=> {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(fetchListings, 500);
      });
      document.getElementById('reset-filters')
              .addEventListener('click', resetFilters);

      // Navbar scroll efekti
      const navbar = document.querySelector('.navbar-custom');
      window.addEventListener('scroll', ()=> navbar.classList.toggle('scrolled', window.scrollY>50));

      // Bildirim dropdown
      const btn   = document.getElementById('notificationButton');
      const drop  = document.getElementById('notificationDropdown');
      const mark  = document.getElementById('markAllAsRead');
      btn.addEventListener('click', e=>{ e.stopPropagation(); drop.classList.toggle('show'); });
      mark.addEventListener('click', ()=>{ notifications.forEach(n=>n.read=true); updateNotificationUI(); showMessage('Tüm bildirimler okundu.','info'); });
      document.addEventListener('click', e=> {
        if (!drop.contains(e.target) && !btn.contains(e.target)) drop.classList.remove('show');
      });
      updateNotificationUI();
    });

    // … buraya fetchListings, handleAddNewListing, toggleNewListingForm, resetFilters,
    //     showListingDetails, deleteListing, fetchNotifications, updateNotificationUI,
    //     ve bildirimlerle ilgili global değişkenler gelecek …
  </script>
  <script src="js/basiskele-ui.js"></script>
</body>
</html>
