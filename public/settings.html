<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ayarlar - Başiskele Kariyer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="css/basiskele-theme.css">
  <style>
    body { padding-top: 150px; }
    .settings-shell {
      width: min(920px, calc(100% - 28px));
      margin: 0 auto 48px;
    }
    .settings-card {
      padding: 22px;
      margin-bottom: 18px;
      border: 1px solid var(--bk-border);
      border-radius: var(--bk-radius);
      background: rgba(255, 255, 255, .92);
      box-shadow: var(--bk-shadow);
    }
    .profile-pic {
      width: 118px;
      height: 118px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #fff;
      box-shadow: 0 14px 32px rgba(15, 43, 71, .14);
    }
    #userSettingsMessage { display: none; }
    @media (max-width: 620px) { body { padding-top: 120px; } }
  </style>
</head>
<body class="bk-page">
  <main class="settings-shell">
    <section class="settings-card">
      <p class="bk-eyebrow">Ayarlar</p>
      <h1 class="fw-bold mb-2">Hesap bilgileri</h1>
      <p class="bk-muted mb-0">Profil, iletişim ve güvenlik ayarlarını buradan güncelleyebilirsin.</p>
    </section>

    <div id="userSettingsMessage" class="alert" role="alert"></div>

    <section class="settings-card">
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
        <div>
          <p class="bk-eyebrow">Profil</p>
          <h2 class="h4 mb-0">Kişisel bilgiler</h2>
        </div>
        <img id="profilePicPreview" src="https://via.placeholder.com/118?text=Profil" alt="Profil fotoğrafı" class="profile-pic">
      </div>

      <form id="userProfileForm">
        <div class="mb-3">
          <label for="profilePicUpload" class="form-label">Profil Fotoğrafı</label>
          <input type="file" id="profilePicUpload" class="form-control" accept="image/*">
        </div>
        <div class="row g-3">
          <div class="col-md-6">
            <label for="profileName" class="form-label">Ad</label>
            <input type="text" class="form-control" id="profileName" required>
          </div>
          <div class="col-md-6">
            <label for="profileSurname" class="form-label">Soyad</label>
            <input type="text" class="form-control" id="profileSurname" required>
          </div>
          <div class="col-md-6">
            <label for="profileEmail" class="form-label">E-posta</label>
            <input type="email" class="form-control" id="profileEmail" readonly>
          </div>
          <div class="col-md-6">
            <label for="profilePhone" class="form-label">Telefon</label>
            <input type="tel" class="form-control" id="profilePhone">
          </div>
          <div class="col-12">
            <label for="profileAddress" class="form-label">Adres / İlçe</label>
            <input type="text" class="form-control" id="profileAddress">
          </div>
        </div>
        <button type="submit" class="btn btn-primary mt-4">
          <i class="fas fa-save me-2"></i>Bilgileri Kaydet
        </button>
      </form>
    </section>

    <section class="settings-card">
      <p class="bk-eyebrow">Güvenlik</p>
      <h2 class="h4">Şifre değiştir</h2>
      <form id="changePasswordForm">
        <div class="row g-3">
          <div class="col-md-4">
            <label for="currentPassword" class="form-label">Mevcut Şifre</label>
            <input type="password" class="form-control" id="currentPassword" required>
          </div>
          <div class="col-md-4">
            <label for="newPassword" class="form-label">Yeni Şifre</label>
            <input type="password" class="form-control" id="newPassword" required>
          </div>
          <div class="col-md-4">
            <label for="newPasswordConfirm" class="form-label">Yeni Şifre Tekrar</label>
            <input type="password" class="form-control" id="newPasswordConfirm" required>
          </div>
        </div>
        <button type="submit" class="btn btn-warning mt-4">Şifreyi Değiştir</button>
      </form>
    </section>

    <section class="settings-card border-danger">
      <p class="bk-eyebrow text-danger">Tehlikeli alan</p>
      <p class="bk-muted">Hesabını silersen bu işlem geri alınamaz.</p>
      <div class="d-flex flex-wrap gap-2">
        <button class="btn btn-danger" id="deleteAccountBtn">Hesabı Sil</button>
        <button class="btn btn-outline-secondary" id="logoutBtn">Çıkış Yap</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="pages/user_dashboard_app.js"></script>
  <script src="js/basiskele-ui.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
